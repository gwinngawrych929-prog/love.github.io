<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>浪漫表白</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body, html { width: 100%; height: 100%; overflow: hidden; font-family: "Microsoft YaHei", Arial, sans-serif; background: radial-gradient(circle at top, #ff7eb3 0%, #ff758c 35%, #7f7fd5 100%); }
    #canvas { position: absolute; inset: 0; z-index: 1; }
    .overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.2); z-index: 2; }
    .center-box { position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%); width: 92%; max-width: 520px; text-align: center; color: #fff; z-index: 3; }
    .center-box h1 { font-size: 3rem; letter-spacing: 0.1em; text-shadow: 0 0 20px rgba(255,255,255,0.7); }
    .center-box p { margin-top: 1rem; font-size: 1.1rem; line-height: 1.7; }
    .button { margin-top: 2rem; display: inline-block; padding: 14px 32px; border-radius: 999px; background: rgba(255,255,255,0.88); color: #ff3c78; font-size: 1rem; font-weight: 700; cursor: pointer; text-decoration: none; box-shadow: 0 0 30px rgba(255,255,255,0.3); }
    .popup { position: fixed; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.92); width: calc(100% - 40px); max-width: 420px; background: rgba(255,255,255,0.98); border-radius: 22px; box-shadow: 0 20px 60px rgba(0,0,0,0.25); z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.35s ease, transform 0.35s ease; }
    .popup.active { opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto; }
    .popup.reject { width: calc(100% - 24px); max-width: 520px; padding: 24px 20px; }
    .popup-header { padding: 18px 20px 0; text-align: center; }
    .popup-header h2 { font-size: 1.5rem; color: #ff2a7c; }
    .popup-body { padding: 0 20px 20px; color: #333; font-size: 1rem; line-height: 1.8; }
    .popup-buttons { display: flex; justify-content: center; gap: 10px; padding: 0 20px 24px; }
    .popup-buttons button { flex: 1; border: none; border-radius: 999px; padding: 12px 0; font-size: 1rem; font-weight: 700; cursor: pointer; transition: transform .2s ease; }
    .popup-buttons button:hover { transform: translateY(-2px); }
    .btn-confirm { background: linear-gradient(135deg, #ff5bb5, #ff8a9f); color: #fff; }
    .btn-reject { background: #f7f7f7; color: #555; }
    .heart { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle at 30% 30%, #fff, transparent 45%), linear-gradient(135deg, #ff5bb5 0%, #ff2a7c 90%); transform: rotate(-45deg); border-radius: 50% 50% 0 50%; pointer-events: none; z-index: 4; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div class="overlay"></div>
  <div class="center-box">
    <h1>倪潘婷</h1>
    <p>这是我为你准备的特别表白，你愿意成为我女朋友吗？</p>
    <a class="button" id="startButton">愿意吗？</a>
  </div>
  <div class="popup" id="popup">
    <div class="popup-header"><h2 id="popupTitle">...</h2></div>
    <div class="popup-body" id="popupText">...</div>
    <div class="popup-buttons">
      <button class="btn-confirm" id="popupConfirm">愿意</button>
      <button class="btn-reject" id="popupReject">拒绝</button>
    </div>
  </div>

  <script>
    const startButton = document.getElementById('startButton');
    const popup = document.getElementById('popup');
    const popupTitle = document.getElementById('popupTitle');
    const popupText = document.getElementById('popupText');
    const popupConfirm = document.getElementById('popupConfirm');
    const popupReject = document.getElementById('popupReject');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const hearts = [];
    const fireworks = [];
    let popupState = 'hidden';
    let fireworksTimer = null;
    let rejectCount = 0;
    let finalCountdownId = null;
    const rejectMessages = [
      '倪潘婷，我真的很喜欢你😭 我只想和你一起吃甜食，看星星，做你的温柔后盾。',
      '我愿意为你写下每一句情话，只要你能给我一个机会。请你再想想好吗？💌',
      '你的笑容像阳光一样温暖，我想把我的每一天都交给你。别让我一个人守着这份心。',
      '我知道你可能还在犹豫，但我愿意用一生去证明，我的选择从来没有错。',
      '如果你给我一次机会，我会把你宠成最幸福的女孩。请不要轻易放弃我们。',
      '我愿意为你改变，愿意陪你走过每个小雨天和晴天。你愿意让我这样做吗？',
      '你是我心里最重要的人，我会把你捧在手心里，给你最暖的守护。',
      '这是最后一次了，宝宝，给我个机会吧~ 😭'
    ];

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    function resetPopup() {
      popup.classList.remove('reject');
      popup.style.width = '';
      popup.style.maxWidth = '';
      popupReject.style.position = '';
      popupReject.style.left = '';
      popupReject.style.top = '';
      popupReject.style.width = '';
      popupReject.style.height = '';
      popupReject.style.transform = '';
      popupReject.style.transition = '';
      popupReject.style.pointerEvents = '';
      popupReject.style.display = 'inline-block';
      popupReject.disabled = false;
      if (finalCountdownId) {
        clearInterval(finalCountdownId);
        finalCountdownId = null;
      }
    }

    function showQuestion() {
      resetPopup();
      rejectCount = 0;
      popupTitle.innerText = '倪潘婷，你愿意成为我女朋友吗？';
      popupText.innerHTML = '我带着最真诚的心来表白，愿意和我一起走下去吗？';
      popupConfirm.innerText = '愿意';
      popupReject.innerText = '拒绝';
      popupReject.style.display = 'inline-block';
      popup.classList.add('active');
      popupState = 'question';
    }

    function agreeResponse() {
      resetPopup();
      popupTitle.innerText = '你答应了！';
      popupText.innerHTML = '<div>你是我女朋友啊，哈哈，爱死你 ❤️✨</div><div style="font-size:3rem;margin-top:8px;">😄</div>';
      popupConfirm.innerText = '好开心';
      popupReject.style.display = 'none';
      popupState = 'agreed';
      startFireworks(true);
    }

    function startFinalCountdown() {
      if (finalCountdownId) return;
      let seconds = 15;
      popupText.innerHTML = `宝宝，求求你啦，十五秒钟后你不拒绝就默认是愿意了哈<br><span id="countdown">${seconds}</span> 秒`;
      finalCountdownId = setInterval(() => {
        seconds -= 1;
        const el = document.getElementById('countdown');
        if (el) el.innerText = seconds;
        if (seconds <= 0) {
          clearInterval(finalCountdownId);
          finalCountdownId = null;
          agreeResponse();
        }
      }, 1000);
    }

    function rejectResponse() {
      popup.classList.add('reject');
      popupTitle.innerText = rejectCount < rejectMessages.length - 1 ? '求你了...' : '最后一次啦~';
      popupText.innerHTML = rejectMessages[rejectCount];
      popupConfirm.innerText = rejectCount < rejectMessages.length - 1 ? '愿意啦' : '好吧，我同意';
      // 当到达最后一次拒绝时，仍然保留拒绝按钮，进入 final 状态
      if (rejectCount < rejectMessages.length - 1) {
        popupReject.innerText = '我还是不行';
        popupReject.style.display = 'inline-block';
        popupState = 'plead';
      } else {
        popupReject.innerText = '拒绝';
        popupReject.style.display = 'inline-block';
        popupState = 'final';
        startFinalCountdown();
      }
      rejectCount += 1;
    }

    startButton.addEventListener('click', showQuestion);
    popupConfirm.addEventListener('click', () => {
      if (popupState === 'question' || popupState === 'plead' || popupState === 'final') agreeResponse();
      else popup.classList.remove('active');
    });
    popupReject.addEventListener('click', () => {
      if (popupState === 'question' || popupState === 'plead') rejectResponse();
      else if (popupState === 'final') {
        // 小幅移动拒绝按钮，位置靠近“愿意”按钮，计时器由 final 页面首次出现时启动
        const btn = popupReject;
        const rect = btn.getBoundingClientRect();
        const confirmRect = popupConfirm.getBoundingClientRect();
        btn.style.position = 'fixed';
        btn.style.width = rect.width + 'px';
        btn.style.height = rect.height + 'px';
        btn.style.transition = 'all 0.25s ease';
        const offset = 60;
        const dx = (Math.random() * 2 - 1) * offset;
        const dy = (Math.random() * 2 - 1) * offset;
        let newLeft = confirmRect.left + dx;
        let newTop = confirmRect.top + dy;
        newLeft = Math.max(20, Math.min(window.innerWidth - rect.width - 20, newLeft));
        newTop = Math.max(20, Math.min(window.innerHeight - rect.height - 20, newTop));
        btn.style.left = newLeft + 'px';
        btn.style.top = newTop + 'px';
      }
    });

    class Heart {
      constructor(x, y, size, velocityX, velocityY, hue) {
        this.x = x; this.y = y; this.size = size; this.velocityX = velocityX; this.velocityY = velocityY; this.hue = hue;
        this.alpha = 1;
      }
      draw() {
        ctx.save();
        ctx.translate(this.x, this.y);
        ctx.rotate(-Math.PI / 4);
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.arc(0, -this.size / 2, this.size / 2, 0, Math.PI, true);
        ctx.arc(-this.size, -this.size / 2, this.size / 2, 0, Math.PI, true);
        ctx.lineTo(0, this.size);
        ctx.closePath();
        ctx.fillStyle = `hsla(${this.hue}, 90%, 60%, ${this.alpha})`;
        ctx.fill();
        ctx.restore();
      }
      update() {
        this.x += this.velocityX;
        this.y += this.velocityY;
        this.alpha -= 0.008;
        if (this.alpha < 0) this.alpha = 0;
      }
    }

    class Particle {
      constructor(x, y, vx, vy, hue) {
        this.x = x;
        this.y = y;
        this.vx = vx;
        this.vy = vy;
        this.size = 2 + Math.random() * 2.5;
        this.hue = hue;
        this.alpha = 1;
      }
      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.vy += 0.02;
        this.alpha -= 0.02;
        this.size *= 0.98;
      }
      draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, Math.max(this.size, 0.5), 0, Math.PI * 2);
        ctx.fillStyle = `hsla(${this.hue}, 90%, 60%, ${this.alpha})`;
        ctx.fill();
      }
    }

    class Firework {
      constructor(x, y, hue) {
        this.particles = [];
        for (let i = 0; i < 32; i += 1) {
          const angle = Math.random() * Math.PI * 2;
          const speed = 2 + Math.random() * 4;
          this.particles.push(new Particle(x, y, Math.cos(angle) * speed, Math.sin(angle) * speed, hue + Math.random() * 40 - 20));
        }
      }
      update() {
        this.particles.forEach((particle) => particle.update());
      }
      draw() {
        this.particles.forEach((particle) => particle.draw());
      }
      isDone() {
        return this.particles.every((particle) => particle.alpha <= 0);
      }
    }

    function createHeart() {
      const x = Math.random() * canvas.width;
      const y = canvas.height + 30;
      const size = 12 + Math.random() * 18;
      const velocityX = (Math.random() - 0.5) * 1.4;
      const velocityY = -2 - Math.random() * 1.8;
      const hue = 330 + Math.random() * 30;
      hearts.push(new Heart(x, y, size, velocityX, velocityY, hue));
    }

    function createFirework() {
      const x = Math.random() * canvas.width;
      const y = Math.random() * canvas.height * 0.4 + 60;
      const hue = 320 + Math.random() * 40;
      fireworks.push(new Firework(x, y, hue));
    }

    function startFireworks(big = false) {
      if (fireworksTimer) return;
      const interval = big ? 120 : 400;
      const duration = big ? 5000 : 3400;
      const initialBursts = big ? 4 : 1;
      for (let i = 0; i < initialBursts; i += 1) {
        createFirework();
      }
      fireworksTimer = setInterval(createFirework, interval);
      setTimeout(() => {
        clearInterval(fireworksTimer);
        fireworksTimer = null;
      }, duration);
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      if (Math.random() < 0.22) createHeart();
      hearts.forEach((heart, idx) => {
        heart.update();
        heart.draw();
        if (heart.alpha <= 0) hearts.splice(idx, 1);
      });
      fireworks.forEach((firework, idx) => {
        firework.update();
        firework.draw();
        if (firework.isDone()) fireworks.splice(idx, 1);
      });
      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
